name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: install
        run: pip install -e ".[test]"
      #the default run skips the integration tests, which need the
      #faust toolchain; the core compiler runs on numpy alone.
      - name: run unit tests
        run: pytest -q
